# Builds the site (drafts included) and deploys it to Cloudflare Pages as a
# preview, then comments the preview URL on the PR.
#
# One-time setup required before this can succeed:
#   1. Create a Cloudflare Pages project named "nutchanon-org" (Direct Upload):
#        npx wrangler pages project create nutchanon-org --production-branch main
#      ...or via the dashboard: Workers & Pages -> Create -> Pages -> Upload assets.
#   2. Add two repository secrets (Settings -> Secrets and variables -> Actions):
#        CLOUDFLARE_API_TOKEN   - API token with the "Cloudflare Pages: Edit" permission
#        CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account ID
name: Preview (Cloudflare Pages)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Build & deploy preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (drafts included)
        run: bun run build
        env:
          INCLUDE_DRAFTS: 'true'

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=nutchanon-org --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        with:
          script: |
            const { DEPLOY_URL, ALIAS_URL } = process.env;
            const marker = '<!-- cf-pages-preview -->';
            const body = [
              marker,
              '### Cloudflare Pages preview',
              '',
              '| | URL |',
              '| --- | --- |',
              `| This commit | ${DEPLOY_URL ? `<${DEPLOY_URL}>` : '_n/a_'} |`,
              `| Branch alias | ${ALIAS_URL ? `<${ALIAS_URL}>` : '—'} |`,
              '',
              'Drafts (`published: false`) **are** rendered in this build, so unpublished posts are reachable under `/blog/`.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
